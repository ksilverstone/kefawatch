services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kefawatch
      POSTGRES_USER: kefa
      POSTGRES_PASSWORD: kefa
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kefa -d kefawatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_started
      analytics:
        condition: service_started

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kefawatch
      DB_USER: kefa
      DB_PASSWORD: kefa
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: docker-compose-dev-secret-change-me-32chars-min!!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  analytics:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    expose:
      - "8080"
